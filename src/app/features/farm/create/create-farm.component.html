<div class="page">
    <h1 class="page-title">Create Farm</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="card">

        <div class="section-label">Basic info</div>

        <div class="form-group">
            <label class="form-label">Farm name *</label>
            <input class="form-control" formControlName="name" type="text" placeholder="e.g. Sunny Acres" />
            @if (form.controls.name.touched && form.controls.name.invalid) {
                <span class="field-error">Name is required (min 2 characters)</span>
            }
        </div>

        <div class="form-group">
            <label class="form-label">Address *</label>
            <input class="form-control" formControlName="address" type="text" placeholder="123 Farm Road, City" />
            @if (form.controls.address.touched && form.controls.address.invalid) {
                <span class="field-error">Address is required</span>
            }
        </div>

        <div class="section-label" style="margin-top:8px">Optional details</div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input class="form-control" formControlName="phone" type="tel" placeholder="+1 555 000 0000" />
            </div>
            <div class="form-group">
                <label class="form-label">Website</label>
                <input class="form-control" formControlName="website" type="url" placeholder="https://…" />
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-control" formControlName="description" rows="3"
                      placeholder="Tell customers about your farm…"></textarea>
        </div>

        @if (error()) {
            <div class="alert alert-danger">{{ error() }}</div>
        }

        <div class="btn-row">
            <button class="btn btn-primary" type="submit" [disabled]="form.invalid || loading()">
                {{ loading() ? 'Creating…' : 'Create farm' }}
            </button>
        </div>

    </form>
</div>
