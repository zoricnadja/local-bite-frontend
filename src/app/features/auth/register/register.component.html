<div class="auth-page">
    <div class="auth-card">
    <div class="auth-brand">
        <span class="auth-brand-icon">🌿</span>
        <h1>Create account</h1>
        <p>Join the Local Bite platform</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" formControlName="email" placeholder="you@farm.com" />
        </div>

        <div class="form-group" style="margin-top:14px">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" formControlName="password" placeholder="••••••••" />
        </div>

        <div class="form-group" style="margin-top:14px">
        <label class="form-label">Role</label>
        <select class="form-control" formControlName="role">
            <option value="FARM_OWNER">Farm Owner</option>
            <option value="CUSTOMER">Customer</option>
        </select>
        </div>

        @if (error()) {
        <div class="alert alert-danger" style="margin-top:14px">{{ error() }}</div>
        }

        <button class="btn btn-primary" style="width:100%;margin-top:20px;justify-content:center"
                type="submit" [disabled]="loading() || form.invalid">
        @if (loading()) { <span class="spinner"></span> }
        Create account
        </button>
    </form>

    <p class="auth-footer">
        Already have an account? <a routerLink="/auth/login">Sign in</a>
    </p>
    </div>
</div>
