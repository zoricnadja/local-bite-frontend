<div class="page">
    <div class="page-header">
    <div>
        <h1 class="page-title">{{ isEdit() ? 'Edit' : 'Add' }} Raw Material</h1>
    </div>
    <a routerLink="/raw-materials" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card" style="max-width:720px">
    <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-grid">
        <div class="form-group form-full">
            <label class="form-label">Name *</label>
            <input class="form-control" formControlName="name" placeholder="e.g. Svinjsko meso" />
        </div>

        <div class="form-group">
            <label class="form-label">Type *</label>
            <select class="form-control" formControlName="material_type">
            <option value="">Select type…</option>
            <option value="meat">Meat</option>
            <option value="dairy">Dairy</option>
            <option value="vegetable">Vegetable</option>
            <option value="fruit">Fruit</option>
            <option value="grain">Grain</option>
            <option value="spice">Spice</option>
            <option value="herb">Herb</option>
            <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Supplier</label>
            <input class="form-control" formControlName="supplier" placeholder="Supplier name" />
        </div>

        <div class="form-group">
            <label class="form-label">Quantity *</label>
            <input class="form-control" type="number" formControlName="quantity" min="0" step="0.001" />
        </div>

        <div class="form-group">
            <label class="form-label">Unit *</label>
            <select class="form-control" formControlName="unit">
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="l">l</option>
            <option value="ml">ml</option>
            <option value="pcs">pcs</option>
            <option value="box">box</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Low Stock Threshold</label>
            <input class="form-control" type="number" formControlName="low_stock_threshold" min="0" step="0.001" placeholder="Alert when below this" />
        </div>

        <div class="form-group">
            <label class="form-label">Origin</label>
            <input class="form-control" formControlName="origin" placeholder="e.g. Serbia" />
        </div>

        <div class="form-group">
            <label class="form-label">Harvest Date</label>
            <input class="form-control" type="date" formControlName="harvest_date" />
        </div>

        <div class="form-group">
            <label class="form-label">Expiry Date</label>
            <input class="form-control" type="date" formControlName="expiry_date" />
        </div>

        <div class="form-group form-full">
            <label class="form-label">Notes</label>
            <textarea class="form-control" formControlName="notes" placeholder="Any additional notes…"></textarea>
        </div>
        </div>

        @if (error()) {
        <div class="alert alert-danger" style="margin-top:16px">{{ error() }}</div>
        }

        <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-primary" type="submit" [disabled]="loading() || form.invalid">
            @if (loading()) { <span class="spinner"></span> }
            {{ isEdit() ? 'Save changes' : 'Create material' }}
        </button>
        <a routerLink="/raw-materials" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    </div>
</div>
