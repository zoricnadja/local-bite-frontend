<div class="auth-wrapper">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create account</mat-card-title>
      <mat-card-subtitle>Register to get started</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="you@example.com" />
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="email?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="email?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="password?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword" />
          <mat-icon matPrefix>lock_outline</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm">
            <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="confirmPassword?.hasError('required')">Please confirm your password</mat-error>
          <mat-error *ngIf="confirmPassword?.hasError('passwordMismatch')">Passwords do not match</mat-error>
        </mat-form-field>

        <mat-error *ngIf="errorMessage" class="server-error">
          <mat-icon>error_outline</mat-icon> {{ errorMessage }}
        </mat-error>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-btn"
          [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          <span *ngIf="!loading">Create Account</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="redirect-text">
        Already have an account?
        <a routerLink="/login" mat-button color="primary">Sign In</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
